<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
<link rel="stylesheet" href="./assets/css/reset.css"/>
<link rel="stylesheet" href="./assets/css/styles.css"/>
    <title>Proyecto 2 CSS Hugo Jovel Web</title>
</head>
<body>
    <div class="layout">
        <main class="layout__main">
            <div class="main__user">
                <figure class="user__container-img"> 
                    <img class="user__img" src="./assets/img/default-user2.jpg" alt="imagen del usuario">

                </figure>
                <div class="user__content">
                    <span class="user__name">Hugo Jovel Web</span>
                    <span class="user__nick">@HugoJovelWeb</span>

                </div>
                <p class="user__city">El Rosario</p>

            </div>

            <div class="main__follows">
                <div class="follows__follow">
                    <p class="follow__number">
                        15k
                    </p>
                    <p class="follow__subtitle">
                        Seguidores
                    </p>                    
                </div>
            </div>
            <div class="main__follows">
                <div class="follows__follow">
                    <p class="follow__number">
                        2k
                    </p>
                    <p class="follow__subtitle">
                        Posts
                    </p>                    
                </div>
            </div>
            <div class="main__follows">
                <div class="follows__follow">
                    <p class="follow__number">
                        125k
                    </p>
                    <p class="follow__subtitle">
                        Me gustas
                    </p>                    
                </div>
            </div>                        

        </main>
    </div>
</body>
</html>
